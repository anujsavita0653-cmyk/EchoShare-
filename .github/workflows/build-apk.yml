name: Build EchoShare APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.7 directly
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
          /tmp/gradle-dist/gradle-8.7/bin/gradle --version
          echo "GRADLE_BIN=/tmp/gradle-dist/gradle-8.7/bin/gradle" >> $GITHUB_ENV

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Accept SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build Debug APK
        run: $GRADLE_BIN assembleDebug --stacktrace --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: EchoShare-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0-b${{ github.run_number }}
          name: EchoShare v1.0 Build ${{ github.run_number }}
          body: |
            EchoShare APK taiyar hai!
            1. app-debug.apk download karo
            2. Unknown Sources ON karo
            3. Install karo
          files: app/build/outputs/apk/debug/app-debug.apk

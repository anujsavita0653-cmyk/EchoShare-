name: Build EchoShare APK

  on:
    push:
      branches: [ main, master ]
    workflow_dispatch:

  jobs:
    build:
      name: Build EchoShare APK
      runs-on: ubuntu-latest

      steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Set up JDK 17
          uses: actions/setup-java@v4
          with:
            java-version: '17'
            distribution: 'temurin'

        - name: Install Gradle 8.7
          run: |
            wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /opt/gradle
            echo "/opt/gradle/gradle-8.7/bin" >> $GITHUB_PATH

        - name: Setup Android SDK
          uses: android-actions/setup-android@v3

        - name: Accept Android Licenses
          run: yes | sdkmanager --licenses || true

        - name: Build Debug APK
          run: gradle assembleDebug --stacktrace --no-daemon
          env:
            ANDROID_HOME: /usr/local/lib/android/sdk

        - name: Upload Debug APK
          uses: actions/upload-artifact@v4
          with:
            name: EchoShare-debug
            path: app/build/outputs/apk/debug/app-debug.apk
            retention-days: 30

        - name: Create Release
          if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
          uses: softprops/action-gh-release@v2
          with:
            tag_name: build-${{ github.run_number }}
            name: "EchoShare Build #${{ github.run_number }}"
            body: |
              EchoShare APK ready hai!
              
              **Install karne ka tarika:**
              1. app-debug.apk download karo
              2. Phone mein Unknown Sources ON karo
              3. APK install karo
            files: app/build/outputs/apk/debug/app-debug.apk
            draft: false
  
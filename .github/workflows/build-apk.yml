name: Build EchoShare APK

  on:
    push:
      branches: [ main, master ]
    workflow_dispatch:

  jobs:
    build:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Set up JDK 17
          uses: actions/setup-java@v4
          with:
            java-version: '17'
            distribution: 'temurin'

        - name: Download Gradle 8.7
          run: |
            wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /opt
            sudo ln -s /opt/gradle-8.7/bin/gradle /usr/local/bin/gradle
            gradle --version

        - name: Create local.properties
          run: echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties

        - name: Accept Android licenses
          run: yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true

        - name: Build Debug APK
          run: gradle assembleDebug --stacktrace --no-daemon
          env:
            ANDROID_HOME: /usr/local/lib/android/sdk

        - name: Upload APK
          uses: actions/upload-artifact@v4
          with:
            name: EchoShare-debug-apk
            path: app/build/outputs/apk/debug/app-debug.apk
            retention-days: 30

        - name: Create Release
          if: success()
          uses: softprops/action-gh-release@v2
          with:
            tag_name: build-${{ github.run_number }}
            name: "EchoShare APK - Build ${{ github.run_number }}"
            body: |
              ## EchoShare APK Taiyar Hai! 🎉
              
              **Install karo:**
              1. Neeche se `app-debug.apk` download karo
              2. Phone Settings → Unknown Sources ON karo
              3. APK install karo
            files: app/build/outputs/apk/debug/app-debug.apk
  
name: Build EchoShare APK

  on:
    push:
      branches: [ main, master ]
    workflow_dispatch:

  jobs:
    build:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Set up JDK 17
          uses: actions/setup-java@v4
          with:
            java-version: '17'
            distribution: 'temurin'

        - name: Fix gradle-wrapper.jar
          run: |
            wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O /tmp/gradle.zip
            unzip -q /tmp/gradle.zip "gradle-8.7/lib/gradle-wrapper.jar" -d /tmp/gd
            cp /tmp/gd/gradle-8.7/lib/gradle-wrapper.jar gradle/wrapper/gradle-wrapper.jar
            echo "JAR size: $(wc -c < gradle/wrapper/gradle-wrapper.jar) bytes"
            chmod +x gradlew

        - name: Create local.properties
          run: echo "sdk.dir=$ANDROID_HOME" > local.properties

        - name: Accept SDK licenses
          run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

        - name: Build Debug APK
          run: ./gradlew assembleDebug --stacktrace --no-daemon
          env:
            GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx4g"

        - name: Upload APK
          if: success()
          uses: actions/upload-artifact@v4
          with:
            name: EchoShare-debug
            path: app/build/outputs/apk/debug/app-debug.apk
            retention-days: 30

        - name: Create Release
          if: success()
          uses: softprops/action-gh-release@v2
          with:
            tag_name: v1.0-b${{ github.run_number }}
            name: EchoShare v1.0 Build ${{ github.run_number }}
            body: |
              EchoShare APK taiyar hai!
              1. app-debug.apk download karo
              2. Unknown Sources ON karo
              3. Install karo
            files: app/build/outputs/apk/debug/app-debug.apk
  